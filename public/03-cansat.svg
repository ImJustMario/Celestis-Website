<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 420" width="420" height="420">
  <defs>
    <linearGradient id="c1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="c2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#1e40af"/>
    </linearGradient>
  </defs>
  <rect width="420" height="420" fill="url(#c1)"/>
  <!-- body -->
  <rect x="170" y="120" width="80" height="140" rx="8" fill="url(#c2)" opacity=".75"/>
  <rect x="175" y="125" width="70" height="130" rx="5" fill="none" stroke="#93c5fd" stroke-width=".8" opacity=".4"/>
  <!-- antenna -->
  <line x1="210" y1="120" x2="210" y2="80" stroke="#94a3b8" stroke-width="2"/>
  <circle cx="210" cy="76" r="4" fill="#60a5fa" opacity=".7"/>
  <!-- signal waves -->
  <path d="M222 80 a14 14 0 0 1 0 -12" fill="none" stroke="#60a5fa" stroke-width=".8" opacity=".35"/>
  <path d="M228 84 a22 22 0 0 1 0 -20" fill="none" stroke="#60a5fa" stroke-width=".6" opacity=".25"/>
  <!-- sensor -->
  <circle cx="210" cy="190" r="14" fill="#0f172a" opacity=".5"/>
  <circle cx="210" cy="190" r="8" fill="#3b82f6" opacity=".5"/>
  <circle cx="210" cy="190" r="3" fill="#93c5fd"/>
  <!-- parachute lines -->
  <line x1="180" y1="120" x2="160" y2="60" stroke="#94a3b8" stroke-width=".8" opacity=".4"/>
  <line x1="240" y1="120" x2="260" y2="60" stroke="#94a3b8" stroke-width=".8" opacity=".4"/>
  <path d="M150 62 Q210 30 270 62" fill="none" stroke="#60a5fa" stroke-width="1.5" opacity=".45"/>
  <!-- base plate -->
  <rect x="175" y="260" width="70" height="8" rx="3" fill="#94a3b8" opacity=".5"/>
  <!-- stars -->
  <circle cx="60" cy="50" r="1" fill="#fff" opacity=".5"/>
  <circle cx="350" cy="80" r="1.1" fill="#fff" opacity=".4"/>
  <circle cx="90" cy="340" r=".9" fill="#fff" opacity=".45"/>
  <circle cx="340" cy="310" r="1" fill="#fff" opacity=".5"/>
  <circle cx="50" cy="200" r=".8" fill="#fff" opacity=".35"/>
  <circle cx="370" cy="200" r="1.2" fill="#fff" opacity=".4"/>
</svg>
