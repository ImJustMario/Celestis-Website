<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" width="640" height="360">
  <defs>
    <linearGradient id="h1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="60%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#1e40af"/>
    </linearGradient>
    <radialGradient id="h2" cx="70%" cy="90%" r="50%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity=".22"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>
  <rect width="640" height="360" fill="url(#h1)"/>
  <rect width="640" height="360" fill="url(#h2)"/>
  <!-- stars -->
  <circle cx="60" cy="30" r="1" fill="#fff" opacity=".7"/>
  <circle cx="180" cy="55" r="1.2" fill="#fff" opacity=".5"/>
  <circle cx="320" cy="25" r=".9" fill="#fff" opacity=".6"/>
  <circle cx="480" cy="50" r="1.1" fill="#fff" opacity=".4"/>
  <circle cx="560" cy="20" r="1.3" fill="#fff" opacity=".55"/>
  <circle cx="100" cy="100" r=".8" fill="#fff" opacity=".45"/>
  <circle cx="420" cy="85" r="1" fill="#fff" opacity=".6"/>
  <circle cx="250" cy="120" r=".7" fill="#fff" opacity=".35"/>
  <!-- Earth curve -->
  <ellipse cx="320" cy="520" rx="420" ry="200" fill="#1e3a8a" opacity=".5"/>
  <ellipse cx="320" cy="520" rx="415" ry="198" fill="none" stroke="#60a5fa" stroke-width="1.2" opacity=".35"/>
  <!-- atmosphere glow -->
  <ellipse cx="320" cy="520" rx="430" ry="208" fill="none" stroke="#93c5fd" stroke-width=".6" opacity=".15"/>
  <ellipse cx="320" cy="520" rx="440" ry="215" fill="none" stroke="#bfdbfe" stroke-width=".3" opacity=".08"/>
</svg>
