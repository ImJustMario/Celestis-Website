<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 340" width="580" height="340">
  <defs>
    <linearGradient id="t1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1a2744"/>
    </linearGradient>
  </defs>
  <rect width="580" height="340" fill="url(#t1)"/>
  <!-- grid lines -->
  <g stroke="#1e3a8a" stroke-width=".3" opacity=".25">
    <line x1="60" y1="60" x2="60" y2="280"/>
    <line x1="60" y1="280" x2="520" y2="280"/>
    <line x1="60" y1="220" x2="520" y2="220" stroke-dasharray="4 4"/>
    <line x1="60" y1="160" x2="520" y2="160" stroke-dasharray="4 4"/>
    <line x1="60" y1="100" x2="520" y2="100" stroke-dasharray="4 4"/>
  </g>
  <!-- waveform -->
  <path d="M60 200 Q100 180 140 210 T220 170 T300 195 T380 140 T460 175 T520 130"
        fill="none" stroke="#60a5fa" stroke-width="2" opacity=".7"/>
  <path d="M60 230 Q120 210 180 240 T300 215 T420 230 T520 200"
        fill="none" stroke="#3b82f6" stroke-width="1.5" opacity=".45"/>
  <!-- data points -->
  <circle cx="140" cy="210" r="4" fill="#60a5fa" opacity=".8"/>
  <circle cx="220" cy="170" r="4" fill="#60a5fa" opacity=".8"/>
  <circle cx="300" cy="195" r="4" fill="#60a5fa" opacity=".8"/>
  <circle cx="380" cy="140" r="4" fill="#60a5fa" opacity=".8"/>
  <circle cx="460" cy="175" r="4" fill="#60a5fa" opacity=".8"/>
  <!-- glow on selected point -->
  <circle cx="380" cy="140" r="12" fill="#3b82f6" opacity=".12"/>
  <circle cx="380" cy="140" r="6" fill="#60a5fa" opacity=".2"/>
  <!-- label hint -->
  <rect x="365" y="108" width="30" height="16" rx="4" fill="#1e3a8a" opacity=".6"/>
  <line x1="380" y1="124" x2="380" y2="134" stroke="#60a5fa" stroke-width=".8" opacity=".5"/>
</svg>
