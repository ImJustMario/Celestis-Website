<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 560" width="400" height="560">
  <defs>
    <linearGradient id="a1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0c1222"/>
      <stop offset="100%" stop-color="#1e3a5f"/>
    </linearGradient>
    <radialGradient id="a2" cx="50%" cy="36%" r="40%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity=".18"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>
  <rect width="400" height="560" fill="url(#a1)"/>
  <rect width="400" height="560" fill="url(#a2)"/>
  <!-- stars -->
  <circle cx="45" cy="55" r="1" fill="#fff" opacity=".7"/>
  <circle cx="130" cy="28" r="1.4" fill="#fff" opacity=".5"/>
  <circle cx="260" cy="70" r="1" fill="#fff" opacity=".8"/>
  <circle cx="340" cy="42" r="1.2" fill="#fff" opacity=".55"/>
  <circle cx="78" cy="150" r=".8" fill="#fff" opacity=".45"/>
  <circle cx="310" cy="125" r="1" fill="#fff" opacity=".65"/>
  <circle cx="185" cy="195" r="1.3" fill="#fff" opacity=".5"/>
  <circle cx="355" cy="240" r=".9" fill="#fff" opacity=".55"/>
  <circle cx="52" cy="310" r="1.1" fill="#fff" opacity=".4"/>
  <circle cx="280" cy="350" r="1" fill="#fff" opacity=".5"/>
  <!-- concentric rings -->
  <circle cx="200" cy="210" r="60" fill="none" stroke="#60a5fa" stroke-width=".6" opacity=".25"/>
  <circle cx="200" cy="210" r="100" fill="none" stroke="#60a5fa" stroke-width=".5" opacity=".18"/>
  <circle cx="200" cy="210" r="140" fill="none" stroke="#60a5fa" stroke-width=".4" opacity=".12"/>
  <circle cx="200" cy="210" r="180" fill="none" stroke="#60a5fa" stroke-width=".3" opacity=".08"/>
  <!-- core glow -->
  <circle cx="200" cy="210" r="28" fill="#3b82f6" opacity=".15"/>
  <circle cx="200" cy="210" r="8" fill="#93c5fd" opacity=".6"/>
  <circle cx="200" cy="210" r="3" fill="#dbeafe"/>
  <!-- horizon line -->
  <path d="M0 480 Q100 460 200 470 T400 465 V560 H0Z" fill="#1e3a8a" opacity=".25"/>
